<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montreal Gas</title>
    <style>
        :root { --bg: #121212; --c: #1e1e1e; --t: #eee; --a: #ff5252; --s: #999; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; padding: 10px; margin: 0; }
        .wrap { max-width: 400px; margin: auto; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        h1 { font-size: 1rem; margin: 0; }
        .row { background: var(--c); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .p { font-size: 1.4rem; font-weight: 900; color: var(--a); }
        .map { font-size: 0.75rem; color: var(--a); text-decoration: none; display: block; margin-top: 4px; }
    </style>
</head>
<body>
<div class="wrap">
    <header><h1>H3W 1X4 Gas</h1><span id="ts" style="font-size: 0.7rem; color: var(--s);">...</span></header>
    <div id="list">Checking for prices...</div>
</div>
<script>
    async function load() {
        const list = document.getElementById('list');
        try {
            const r = await fetch(`gas_prices.json?t=${Date.now()}`);
            if (!r.ok) throw new Error();
            const d = await r.json();
            list.innerHTML = d.map(s => `
                <div class="row">
                    <div>
                        <span style="font-weight:bold">${s.name}</span>
                        <a class="map" href="https://www.google.com/maps/search/${encodeURIComponent(s.name + ' ' + s.address)}" target="_blank">📍 ${s.address}</a>
                    </div>
                    <div class="p">${s.price}¢</div>
                </div>`).join('');
            document.getElementById('ts').innerText = "Updated " + new Date().toLocaleTimeString();
        } catch(e) {
            list.innerHTML = "<p style='text-align:center; color:var(--s)'>Rate limited by provider. Refresh later.</p>";
        }
    }
    load();
</script>
</body>
</html>
