name: Update TV Listings

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Stamp Data
        run: |
          # Fetch the data
          RAW_DATA=$(curl -s "https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X")
          
          # Create a wrapper JSON with the timestamp and the raw data
          # We use 'date' to get the current time in Montreal (EDT/EST)
          TIMESTAMP=$(TZ="America/Montreal" date +"%Y-%m-%d %H:%M")
          echo "{ \"lastUpdated\": \"$TIMESTAMP\", \"channels\": $RAW_DATA }" > tele.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TV listings ($TIMESTAMP)" && git push)
