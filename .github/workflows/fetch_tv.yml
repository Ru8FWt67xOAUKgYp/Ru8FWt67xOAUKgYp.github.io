name: Update TV MTL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');
          const FAVS = [
            {id: "CBFT.ca", name: "Radio-Canada"},
            {id: "CIVM.ca", name: "Télé-Québec"},
            {id: "CFTM.ca", name: "TVA"},
            {id: "CFJP.ca", name: "Noovo"},
            {id: "CBMT.ca", name: "CBC MTL"},
            {id: "LCN.ca", name: "LCN"},
            {id: "SERIESPLUS.ca", name: "Séries Plus"}
          ];

          async function start() {
            try {
              console.log("Fetching XML...");
              const res = await fetch("https://iptv-org.github.io/epg/guides/ca/tvtv.ca.epg.xml");
              const xml = await res.text();
              
              const channels = [];
              
              FAVS.forEach(fav => {
                const listings = [];
                // Split the XML into chunks for this specific channel
                const chunks = xml.split(\`channel="\${fav.id}"\`);
                
                // Skip the first chunk (it's headers), look at the rest
                for (let i = 1; i < chunks.length; i++) {
                  const chunk = chunks[i];
                  if (!chunk.includes('<title')) continue;

                  // Extract Start Time (Format: start="20260327013000")
                  const timeMatch = chunk.match(/start="(\\d{8})(\\d{4})/);
                  // Extract Title
                  const titleMatch = chunk.match(/<title[^>]*>([^<]+)<\\/title>/);

                  if (timeMatch && titleMatch) {
                    const time = timeMatch[2]; // HHMM
                    listings.push({
                      startTime: \`\${time.substring(0,2)}:\${time.substring(2,4)}\`,
                      title: titleMatch[1].replace(/&/g, '&'),
                      raw: timeMatch[1] // For sorting
                    });
                  }
                }

                if (listings.length > 0) {
                  // Sort by date/time and filter for upcoming shows
                  listings.sort((a, b) => a.raw.localeCompare(b.raw));
                  channels.push({
                    name: fav.name,
                    id: fav.id,
                    listings: listings.slice(0, 12)
                  });
                }
              });

              const output = {
                lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
                channels: channels
              };

              fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
              console.log(\`Success: Parsed \${channels.length} channels.\`);
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot"
          git add tele.json
          git commit -m "Fix parsing logic" || exit 0
          git push