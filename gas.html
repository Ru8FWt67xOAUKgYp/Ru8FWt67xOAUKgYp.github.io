<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Montreal Gas Tracker</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1c1c1e; --text: #ffffff; --red: #ff453a; --green: #32d74b; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .wrap { max-width: 400px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; margin: 0; }
        #ts { font-size: 0.75rem; color: #8e8e93; }

        .badge { 
            display: none; background: var(--green); color: #000; 
            font-size: 0.8rem; font-weight: bold; padding: 5px 10px; 
            border-radius: 20px; margin-bottom: 15px; text-align: center;
        }

        .station-card { 
            background: var(--card); padding: 16px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border: 1px solid #2c2c2e;
        }
        .price { font-size: 1.6rem; font-weight: 800; color: var(--red); }
        .st-name { font-weight: 600; font-size: 1rem; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Gas H3W 1X4</h1>
        <span id="ts">Loading...</span>
    </header>

    <div id="drop-badge" class="badge">📉 PRICE DROP DETECTED!</div>

    <div id="list">
        <div style="text-align:center; padding:50px; color:#444;">Syncing with Zyla...</div>
    </div>
</div>

<script>
    async function updateUI() {
        try {
            const r = await fetch(`gas_prices.json?t=${Date.now()}`);
            const data = await r.json();
            
            // 1. Show badge if price is lower than last check
            if (data.current_min < data.prev_min && data.prev_min > 0) {
                document.getElementById('drop-badge').style.display = 'block';
            }

            // 2. Render stations
            document.getElementById('list').innerHTML = data.stations.map(s => `
                <div class="station-card">
                    <span class="st-name">${s.name}</span>
                    <span class="price">${s.price}¢</span>
                </div>
            `).join('');

            document.getElementById('ts').innerText = data.last_updated;
        } catch(e) {
            document.getElementById('list').innerHTML = "<p>Data pending. Trigger GitHub Action manually.</p>";
        }
    }
    updateUI();
</script>
</body>
</html>
