<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Guide TV Montréal</title>
    <style>
        :root {
            --accent: #00a2ff;
            --bg: #ffffff;
            --card: #f4f4f9;
            --text: #1a1a1a;
            --border: #ddd;
        }

        /* Auto Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f;
                --card: #1a1a1a;
                --text: #eee;
                --border: #333;
            }
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s; }
        .container { max-width: 600px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .card { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: transform 0.1s; position: relative; overflow: hidden; }
        .card:active { transform: scale(0.98); }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }

        .ch-name { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; }
        .show-title { font-size: 1.1rem; font-weight: 600; margin: 4px 0; }
        .time-now { color: var(--accent); font-weight: bold; font-size: 0.85rem; }

        /* Popup Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        .popup { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 15px; max-width: 500px; width: 100%; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #888; }

        .loader { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <header><h2>Ma Télé</h2></header>
    <div id="guide" class="loader">Synchronisation...</div>
    <footer style="text-align:center; font-size:0.7rem; color:#666; margin-top:20px;">
        Mise à jour: <span id="update-time">...</span>
    </footer>
</div>

<div id="overlay" onclick="closePopup()">
    <div class="popup" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <div id="popup-ch" class="ch-name"></div>
        <h2 id="popup-title" style="margin: 10px 0;"></h2>
        <p id="popup-desc" style="line-height: 1.6; color: #aaa;"></p>
        <div id="popup-time" class="time-now"></div>
    </div>
</div>

<script>
    const MY_FAVORITES = ['CBFT', 'CIVM', 'CFTM', 'CFJP', 'CBMT', 'LCN', 'SERIES'];

    async function loadData() {
        try {
            const res = await fetch('./tele.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('update-time').innerText = data.lastUpdated;
            const guide = document.getElementById('guide');
            guide.innerHTML = "";

            const filtered = data.channels.filter(s => 
                MY_FAVORITES.some(f => (s.callSign||"").toUpperCase().includes(f))
            ).sort((a,b) => 
                MY_FAVORITES.findIndex(f => a.callSign.includes(f)) - MY_FAVORITES.findIndex(f => b.callSign.includes(f))
            );

            filtered.forEach(station => {
                const now = station.listings[0];
                if (!now) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showPopup(station.listName, now.title, now.description, now.startTime);
                card.innerHTML = `
                    <div class="ch-name">${station.listName} • CH ${station.channel}</div>
                    <div class="show-title">${now.title}</div>
                    <div class="time-now">${now.startTime} — ${now.duration}m</div>
                `;
                guide.appendChild(card);
            });
        } catch (e) { document.getElementById('guide').innerText = "Erreur de chargement."; }
    }

    function showPopup(ch, title, desc, time) {
        document.getElementById('popup-ch').innerText = ch;
        document.getElementById('popup-title').innerText = title;
        document.getElementById('popup-desc').innerText = desc || "Aucune description disponible.";
        document.getElementById('popup-time').innerText = "Début: " + time;
        document.getElementById('overlay').style.display = 'flex';
    }

    function closePopup() { document.getElementById('overlay').style.display = 'none'; }

    loadData();
    setInterval(loadData, 300000);
</script>

</body>
</html>
