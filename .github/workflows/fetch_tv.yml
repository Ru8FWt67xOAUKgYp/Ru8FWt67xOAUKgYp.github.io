name: Update TV Listings (API Method)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch from API
        run: |
          python3 <<EOF
          import urllib.request
          import json
          from datetime import datetime, timedelta

          # Montreal-specific Station IDs (Zap2It/TVGids stable IDs)
          STATIONS = [
              {"id": "11186", "name": "CBFT (SRC)", "call": "CBFT"},
              {"id": "11187", "name": "CIVM (TQ)", "call": "CIVM"},
              {"id": "11188", "name": "CFTM (TVA)", "call": "CFTM"},
              {"id": "11189", "name": "CFJP (Noovo)", "call": "CFJP"},
              {"id": "11190", "name": "CBMT (CBC)", "call": "CBMT"},
              {"id": "12053", "name": "LCN", "call": "LCN"},
              {"id": "15156", "name": "Séries Plus", "call": "SERIES"}
          ]

          # Using a stable Canadian EPG mirror API
          API_BASE = "https://tv-guide.vercel.app/api/station/"
          
          output_channels = []
          
          for s in STATIONS:
              try:
                  print(f"Fetching {s['name']}...")
                  req = urllib.request.Request(f"{API_BASE}{s['id']}", headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=15) as response:
                      data = json.loads(response.read())
                      
                      ch_obj = {
                          "listName": s['name'],
                          "callSign": s['call'],
                          "channel": "Air",
                          "listings": []
                      }
                      
                      for p in data.get('programs', []):
                          # Format time from the API (usually HH:MM)
                          ch_obj["listings"].append({
                              "title": p['title'],
                              "startTime": p['start'],
                              "duration": p.get('duration', '30m')
                          })
                      
                      if ch_obj["listings"]:
                          output_channels.append(ch_obj)
              except Exception as e:
                  print(f"Skipping {s['name']}: {e}")

          if not output_channels:
              print("No data grabbed. Using emergency dummy data to prevent 404.")
              output_channels = [{"listName": "Error", "callSign": "!", "listings": [{"title": "Retry Action", "startTime": "00:00"}]}]

          now = datetime.now().strftime('%Y-%m-%d %H:%M')
          with open('tele.json', 'w', encoding='utf-8') as f:
              json.dump({"lastUpdated": now, "channels": output_channels}, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update via API" && git push)