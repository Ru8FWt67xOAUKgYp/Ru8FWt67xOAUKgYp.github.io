name: Update TV Listings

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch via Proxy
        run: |
          # Use a proxy that specializes in bypassing CORS/Cloudflare
          TARGET="https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X"
          PROXY="https://api.allorigins.win/get?url="
          
          # We use python to safely encode the URL and process the response
          python3 <<EOF
          import urllib.request
          import urllib.parse
          import json
          import os
          from datetime import datetime
          import pytz

          try:
              # Encode the target URL and fetch via proxy
              encoded_url = urllib.parse.quote("$TARGET", safe='')
              proxy_url = "$PROXY" + encoded_url
              
              print(f"Fetching: {proxy_url}")
              
              with urllib.request.urlopen(proxy_url) as response:
                  data = json.loads(response.read().decode())
                  # AllOrigins wraps the result in a 'contents' field as a string
                  raw_channels = json.loads(data['contents'])
                  
                  # Set up the timestamp for Montreal
                  mtl_tz = pytz.timezone('America/Montreal')
                  now = datetime.now(mtl_tz).strftime('%Y-%m-%d %H:%M')
                  
                  # Create the final structure
                  final_output = {
                      "lastUpdated": now,
                      "channels": raw_channels
                  }
                  
                  # Save to tele.json
                  with open('tele.json', 'w', encoding='utf-8') as f:
                      json.dump(final_output, f, ensure_ascii=False, indent=2)
                  
                  print("Success: tele.json created successfully.")

          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          # Check if there are changes before committing
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TV listings ($(date))"
            git push
          fi
