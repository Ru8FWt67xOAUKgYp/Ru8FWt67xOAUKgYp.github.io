name: Update TV Listings

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Stamp Data
        run: |
          # Define "Human" Headers
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          REFERER="https://www.tvtv.ca/qc/montreal/h4a1e1/luCAN-0004264-X"
          
          # Perform the fetch with multiple headers
          RAW_DATA=$(curl -s \
            -H "User-Agent: $USER_AGENT" \
            -H "Referer: $REFERER" \
            -H "Accept: application/json, text/plain, */*" \
            "https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X")
          
          # Sanity check: Ensure the output starts with a JSON bracket [ or {
          if [[ $RAW_DATA == \[* ]] || [[ $RAW_DATA == \{* ]]; then
            TIMESTAMP=$(TZ="America/Montreal" date +"%Y-%m-%d %H:%M")
            echo "{ \"lastUpdated\": \"$TIMESTAMP\", \"channels\": $RAW_DATA }" > tele.json
            echo "Success: JSON data saved to tele.json"
          else
            echo "Error: Received HTML or empty response instead of JSON."
            echo "First 100 characters of response: ${RAW_DATA:0:100}"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TV listings ($TIMESTAMP)" && git push)
