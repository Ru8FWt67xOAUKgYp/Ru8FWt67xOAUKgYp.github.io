<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montreal Gas Prices</title>
    <style>
        :root {
            --bg: #ffffff; --card: #f9f9fb; --text: #111111;
            --accent: #e53935; --sub: #777777; --brd: #eeeeee;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card: #1e1e1e; --text: #f0f0f0;
                --accent: #ff5252; --sub: #999999; --brd: #333333;
            }
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 400px; }
        header {
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 1px solid var(--brd); padding-bottom: 8px; margin-bottom: 15px;
        }
        h1 { font-size: 1.1rem; margin: 0; }
        #timestamp { font-size: 0.7rem; color: var(--sub); }
        .station {
            background: var(--card); padding: 12px; margin-bottom: 10px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .name { font-weight: bold; font-size: 0.95rem; display: block; margin-bottom: 2px; }
        .map-btn { font-size: 0.8rem; color: var(--accent); text-decoration: none; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Gas (H3W 1X4)</h1>
        <span id="timestamp">Syncing...</span>
    </header>
    <div id="gas-list">Loading data...</div>
</div>

<script>
    async function loadPrices() {
        const list = document.getElementById('gas-list');
        const time = document.getElementById('timestamp');
        try {
            const res = await fetch(`gas_prices.json?nocache=${Date.now()}`);
            const data = await res.json();
            list.innerHTML = data.map(s => `
                <div class="station">
                    <div>
                        <span class="name">${s.name}</span>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name + ' ' + s.address)}" 
                           target="_blank" class="map-btn">📍 ${s.address}</a>
                    </div>
                    <div class="price">${s.price}¢</div>
                </div>
            `).join('');
            time.innerText = "Updated " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        } catch (e) {
            list.innerHTML = "<p style='text-align:center; color:var(--sub)'>Data file empty or not yet generated.</p>";
        }
    }
    loadPrices();
</script>
</body>
</html>
