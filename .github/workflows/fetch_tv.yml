name: Update TV MTL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');

          // The exact IDs used by the global IPTV-org database for Montreal
          const FAVS = ["CBFT.ca", "CIVM.ca", "CFTM.ca", "CFJP.ca", "CBMT.ca", "LCN.ca", "SERIESPLUS.ca"];

          async function start() {
            try {
              // Fetching from the official JS-ready mirror (no 404s here)
              const res = await fetch("https://iptv-org.github.io/api/guides.json");
              const allGuides = await res.json();
              
              const myGuides = allGuides.filter(g => FAVS.includes(g.channel));
              
              const output = {
                lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
                channels: myGuides.map(g => ({
                  name: g.channel.split('.')[0],
                  url: g.url, // Link to the raw EPG if you ever need it
                  site: g.site
                }))
              };

              fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
              console.log("Success!");
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot"
          git add tele.json
          git commit -m "Update" || exit 0
          git push