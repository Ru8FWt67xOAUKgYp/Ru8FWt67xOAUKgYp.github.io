<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV MTL</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --accent: #007aff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .ch-name { font-weight: 800; font-size: 0.8rem; color: #8e8e93; margin-bottom: 5px; }
        .title { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
        .time { font-size: 0.9rem; opacity: 0.7; }
        footer { text-align: center; font-size: 10px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="guide">Chargement du guide...</div>
    <footer id="meta"></footer>

<script>
    async function init() {
        try {
            const res = await fetch('./tele.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('meta').innerText = "Sync: " + data.lastUpdated;
            
            const container = document.getElementById('guide');
            container.innerHTML = "";

            // Loop through channels and show basic info
            data.channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="ch-name">${ch.name}</div>
                    <div class="title">En direct...</div>
                    <div class="time">Consulter l'horaire complet</div>
                `;
                // If you want to link directly to the source for detail:
                div.onclick = () => window.open(ch.url, '_blank');
                container.appendChild(div);
            });
        } catch (e) {
            document.getElementById('guide').innerText = "Erreur de synchro.";
        }
    }
    init();
</script>
</body>
</html>
