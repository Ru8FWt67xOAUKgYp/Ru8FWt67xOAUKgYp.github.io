name: Update TV Listings (Direct Fetch)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Data
        run: |
          node <<EOF
          const fs = require('fs');

          async function grab() {
            // Using AllOrigins as a bypass for the Cloudflare block
            const target = "https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X";
            const url = "https://api.allorigins.win/get?url=" + encodeURIComponent(target);
            
            try {
              const res = await fetch(url);
              const wrapper = await res.json();
              const channels = JSON.parse(wrapper.contents);
              
              if (!Array.isArray(channels)) throw new Error("Invalid format");

              const now = new Date().toLocaleString("en-CA", {timeZone: "America/Montreal", hour12: false});
              const output = { lastUpdated: now, channels: channels };
              
              fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
              console.log("Success: Data saved.");
            } catch (e) {
              console.error("Fetch failed: ", e.message);
              process.exit(1);
            }
          }
          grab();
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Direct data sync" && git push)