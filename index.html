<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>My Hub</title>
    <style>
        :root {
            --bg: #f4f4f9; --card: #ffffff; --text: #1a1a1a;
            --accent: #6200ee; --dim: #757575; --shadow: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
                --accent: #bb86fc; --dim: #999; --shadow: rgba(0,0,0,0.5);
            }
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: env(safe-area-inset-top) 15px 30px 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Weather */
        <div class="weather-row" style="justify-content: flex-end; align-items: flex-start; min-height: 100px;">
            <div style="text-align: right;">
                <div id="w-icon" style="font-size: 2.2rem; line-height: 1; margin-bottom: 4px;">🌤️</div>
                <div id="temp" style="font-size: 1.8rem; font-weight: bold; line-height: 1;">--°C</div>
                <div id="w-desc" style="font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;">Feels Like</div>
            </div>
        </div>

        /* Enhanced Search Containers */
        .search-container {
            position: relative;
            width: 100%; max-width: 400px;
            margin-bottom: 15px;
        }
        .search-input {
            width: 100%; padding: 12px 40px 12px 20px;
            border-radius: 25px; border: 1px solid var(--dim);
            background: var(--card); color: var(--text);
            box-sizing: border-box; outline: none; font-size: 1rem;
        }
        .clear-btn {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--dim); cursor: pointer;
            font-size: 1.2rem; display: none;
            user-select: none;
        }

        /* App Grid */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; width: 100%; max-width: 400px; margin-bottom: 30px;
        }
        .app-link {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit; background: var(--card);
            padding: 15px 5px; border-radius: 12px;
            box-shadow: 0 2px 5px var(--shadow);
        }
        .app-link:active { transform: scale(0.92); }
        .icon { font-size: 1.8rem; margin-bottom: 5px; }
        .label { font-size: 0.7rem; font-weight: 500; }

        /* RSS Section */
        .rss-container { width: 100%; max-width: 400px; }
        .rss-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .rss-title { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .rss-item {
            background: var(--card); padding: 15px; border-radius: 10px;
            margin-bottom: 12px; border-left: 4px solid var(--accent);
            box-shadow: 0 2px 5px var(--shadow);
        }
        .rss-item a { color: var(--text); text-decoration: none; font-weight: bold; display: block; }
        .rss-meta { font-size: 0.75rem; color: var(--dim); margin-top: 6px; }
        .source-tag {
            background: var(--accent); color: var(--bg);
            padding: 2px 6px; border-radius: 4px; font-size: 0.6rem;
            margin-right: 8px; text-transform: uppercase;
        }
        button#load-more {
            width: 100%; padding: 12px; background: var(--card);
            color: var(--accent); border: 1px solid var(--accent);
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="weather-row">
        <div><div id="temp" class="temp">--°C</div><div style="font-size: 0.8rem; opacity: 0.7;">Montreal, QC</div></div>
        <div style="text-align: right;"><div style="font-size: 2rem;">🌤️</div><div id="w-desc" style="font-size: 0.8rem; color: var(--accent);">Montreal</div></div>
    </div>

    <div class="search-container">
        <input type="text" id="web-search" class="search-input" inputmode="search" placeholder="Search the web..." 
               oninput="toggleClear('web-search', 'web-clear')"
               onkeydown="handleWebSearch(event)">
        <span id="web-clear" class="clear-btn" onclick="clearInput('web-search', 'web-clear')">×</span>
    </div>

    <div class="grid">
        <a href="https://m.youtube.com" class="app-link"><span class="icon">📺</span><span class="label">YouTube</span></a>
        <a href="https://reddit.com" class="app-link"><span class="icon">🤖</span><span class="label">Reddit</span></a>
        <a href="https://instagram.com" class="app-link"><span class="icon">📸</span><span class="label">Insta</span></a>
        <a href="https://amazon.ca" class="app-link"><span class="icon">🛒</span><span class="label">Amazon</span></a>
        <a href="https://maps.google.com" class="app-link"><span class="icon">📍</span><span class="label">Maps</span></a>
        <a href="http://raspberrypi.local" class="app-link" style="border: 1px solid var(--accent);"><span class="icon">🏠</span><span class="label">Pi Hub</span></a>
    </div>

    <div class="rss-container">
        <div class="rss-header">
            <div class="rss-title">My Feeds</div>
            <div id="last-update" style="font-size: 0.7rem; color: var(--dim);">Updating...</div>
        </div>
        
        <div class="search-container">
            <input type="text" id="rss-filter" class="search-input" placeholder="Filter headlines..." 
                   oninput="toggleClear('rss-filter', 'rss-clear'); filterFeeds()">
            <span id="rss-clear" class="clear-btn" onclick="clearInput('rss-filter', 'rss-clear'); filterFeeds()">×</span>
        </div>

        <div id="feed-status" style="text-align:center; padding:20px; color:var(--dim);">Loading...</div>
        <div id="feed-list"></div>
        <button id="load-more" style="display:none">Load More</button>
    </div>

    <script>
        let allItems = [];
        let filteredItems = [];
        let visibleCount = 5;

        // 1. Search Utilities
        function toggleClear(inputId, clearId) {
            const input = document.getElementById(inputId);
            const clearBtn = document.getElementById(clearId);
            clearBtn.style.display = input.value.length > 0 ? 'block' : 'none';
        }

        function clearInput(inputId, clearId) {
            document.getElementById(inputId).value = '';
            document.getElementById(clearId).style.display = 'none';
            document.getElementById(inputId).focus();
        }

        function handleWebSearch(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const query = document.getElementById('web-search').value;
                if (query) window.location.href = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
                return false;
            }
        }

        // 2. Weather & RSS Fetching
async function fetchWeather() {
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.5017&longitude=-73.5673&current=apparent_temperature");
        const data = await res.json();
        
        // Fetch and round the Feels Like temperature
        const feelsLike = Math.round(data.current.apparent_temperature);
        
        document.getElementById('temp').innerText = `${feelsLike}°C`;
        document.getElementById('w-desc').innerText = "Feels Like";
    } catch (e) { 
        console.error("Weather error:", e); 
        document.getElementById('temp').innerText = "--°C";
        document.getElementById('w-desc').innerText = "Offline";
    }
}
        async function fetchRSS() {
            try {
                const res = await fetch("./feeds.json");
                const data = await res.json();
                allItems = data.feeds;
                filteredItems = [...allItems];
                document.getElementById('last-update').innerText = `Updated at ${data.updated}`;
                document.getElementById('feed-status').style.display = 'none';
                render();
            } catch (e) { document.getElementById('feed-status').innerText = "feeds.json not found."; }
        }

        function render() {
            const list = document.getElementById('feed-list');
            const btn = document.getElementById('load-more');
            list.innerHTML = filteredItems.slice(0, visibleCount).map(i => `
                <div class="rss-item">
                    <a href="${i.link}" target="_blank">${i.title}</a>
                    <div class="rss-meta"><span class="source-tag">${i.source}</span> ${i.date}</div>
                </div>
            `).join('');
            btn.style.display = visibleCount < filteredItems.length ? 'block' : 'none';
        }

        function filterFeeds() {
            const query = document.getElementById('rss-filter').value.toLowerCase();
            filteredItems = allItems.filter(i => i.title.toLowerCase().includes(query) || i.source.toLowerCase().includes(query));
            visibleCount = 5;
            render();
        }

        document.getElementById('load-more').onclick = () => { visibleCount += 5; render(); };

        fetchWeather();
        fetchRSS();
    </script>
</body>
</html>
