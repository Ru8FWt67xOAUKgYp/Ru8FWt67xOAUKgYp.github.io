name: Update Gas Prices
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Requests
        run: pip install requests
      - name: Fetch Data
        run: python update_gas.py
      - name: Push to Repo
        run: |
          git config --global user.name "GasBot"
          git config --global user.email "actions@github.com"
          git add gas_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync prices" && git push)