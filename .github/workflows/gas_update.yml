name: Update Gas Prices

on:
  schedule:
    - cron: '0 */12 * * *' # Reduced to twice a day to stay under the radar
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install requests

      - name: Random Delay
        # Wait a random amount of time (1-60s) so we don't hit the server 
        # at the exact same second as other GitHub users
        run: sleep $((1 + $RANDOM % 60))

      - name: Run Gas Scraper
        run: python update_gas.py

      - name: Commit and Push
        run: |
          git config --global user.name "GasBot"
          git config --global user.email "actions@github.com"
          git add gas_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update prices" && git push)