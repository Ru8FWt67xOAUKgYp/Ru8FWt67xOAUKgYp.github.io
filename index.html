<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>My Mobile Hub</title>
    <style>
        /* 1. THEME VARIABLES (Automated) */
        :root {
            --bg: #f4f4f9; --card: #ffffff; --text: #1a1a1a;
            --accent: #6200ee; --dim: #757575; --shadow: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
                --accent: #bb86fc; --dim: #999; --shadow: rgba(0,0,0,0.5);
            }
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Weather Section */
        .weather-row {
            width: 100%; max-width: 400px;
            background: var(--card); padding: 20px;
            border-radius: 15px; display: flex;
            justify-content: space-between; align-items: center;
            margin-bottom: 20px; box-shadow: 0 4px 12px var(--shadow);
            box-sizing: border-box;
        }
        .temp { font-size: 2.5rem; font-weight: bold; }

        /* Search Bars */
        .search-input {
            width: 100%; max-width: 400px;
            padding: 12px 20px; margin-bottom: 15px;
            border-radius: 25px; border: 1px solid var(--dim);
            background: var(--card); color: var(--text);
            box-sizing: border-box; outline: none;
        }

        /* App Grid */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; width: 100%; max-width: 400px; margin-bottom: 30px;
        }
        .app-link {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit; background: var(--card);
            padding: 15px 5px; border-radius: 12px;
            box-shadow: 0 2px 5px var(--shadow); transition: transform 0.1s;
        }
        .app-link:active { transform: scale(0.92); }
        .icon { font-size: 1.8rem; margin-bottom: 5px; }
        .label { font-size: 0.7rem; font-weight: 500; }

        /* RSS Section */
        .rss-container { width: 100%; max-width: 400px; }
        .rss-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .rss-title { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .rss-item {
            background: var(--card); padding: 15px; border-radius: 10px;
            margin-bottom: 12px; border-left: 4px solid var(--accent);
            box-shadow: 0 2px 5px var(--shadow);
        }
        .rss-item a { color: var(--text); text-decoration: none; font-weight: bold; display: block; line-height: 1.4; }
        .rss-meta { font-size: 0.75rem; color: var(--dim); margin-top: 6px; display: flex; align-items: center; }
        .source-tag {
            background: var(--accent); color: var(--bg);
            padding: 2px 6px; border-radius: 4px; font-size: 0.6rem;
            margin-right: 8px; text-transform: uppercase;
        }

        button#load-more {
            width: 100%; padding: 12px; background: var(--card);
            color: var(--accent); border: 1px solid var(--accent);
            border-radius: 8px; font-weight: bold; margin-bottom: 40px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="weather-row">
        <div>
            <div id="temp" class="temp">--°C</div>
            <div style="font-size: 0.8rem; opacity: 0.7;">Montreal, QC</div>
        </div>
        <div style="text-align: right;">
            <div id="w-icon" style="font-size: 2rem;">🌤️</div>
            <div id="w-desc" style="font-size: 0.8rem; color: var(--accent);">Montreal</div>
        </div>
    </div>

    <input type="text" class="search-input" placeholder="Search the web..." 
           onkeydown="if(event.key==='Enter') window.location='https://duckduckgo.com/?q='+this.value">

    <div class="grid">
        <a href="https://m.youtube.com" class="app-link"><span class="icon">📺</span><span class="label">YouTube</span></a>
        <a href="https://reddit.com" class="app-link"><span class="icon">🤖</span><span class="label">Reddit</span></a>
        <a href="https://instagram.com" class="app-link"><span class="icon">📸</span><span class="label">Insta</span></a>
        <a href="https://amazon.ca" class="app-link"><span class="icon">🛒</span><span class="label">Amazon</span></a>
        <a href="https://maps.google.com" class="app-link"><span class="icon">📍</span><span class="label">Maps</span></a>
        <a href="http://raspberrypi.local" class="app-link" style="border: 1px solid var(--accent);"><span class="icon">🏠</span><span class="label">Pi Hub</span></a>
    </div>

    <div class="rss-container">
        <div class="rss-header">
            <div class="rss-title">My Feeds</div>
            <div id="last-update" style="font-size: 0.7rem; color: var(--dim);">Checking...</div>
        </div>
        
        <input type="text" id="rss-filter" class="search-input" placeholder="Filter headlines..." oninput="filterFeeds()">

        <div id="feed-status" style="text-align:center; padding:20px; color:var(--dim);">Loading feeds.json...</div>
        <div id="feed-list"></div>
        <button id="load-more" style="display:none">Load More</button>
    </div>

    <script>
        let allItems = [];
        let filteredItems = [];
        let visibleCount = 5;

        // 1. WEATHER FETCH
        async function fetchWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.5017&longitude=-73.5673&current_weather=true");
                const data = await res.json();
                document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + "°C";
            } catch (e) { console.error("Weather offline"); }
        }

        // 2. RSS FETCH (Loading your automated GitHub JSON)
        async function fetchRSS() {
            const status = document.getElementById('feed-status');
            const updateEl = document.getElementById('last-update');
            try {
                const res = await fetch("./feeds.json");
                const data = await res.json();
                
                allItems = data.feeds;
                filteredItems = [...allItems];
                updateEl.innerText = `Updated at ${data.updated}`;
                
                status.style.display = 'none';
                render();
            } catch (e) {
                status.innerText = "feeds.json not found. Run GitHub Action.";
            }
        }

        // 3. RENDER LOGIC
        function render() {
            const list = document.getElementById('feed-list');
            const btn = document.getElementById('load-more');
            list.innerHTML = filteredItems.slice(0, visibleCount).map(i => `
                <div class="rss-item">
                    <a href="${i.link}" target="_blank">${i.title}</a>
                    <div class="rss-meta">
                        <span class="source-tag">${i.source}</span> ${i.date}
                    </div>
                </div>
            `).join('');
            
            btn.style.display = visibleCount < filteredItems.length ? 'block' : 'none';
        }

        // 4. FILTER/SEARCH LOGIC
        function filterFeeds() {
            const query = document.getElementById('rss-filter').value.toLowerCase();
            filteredItems = allItems.filter(i => 
                i.title.toLowerCase().includes(query) || 
                i.source.toLowerCase().includes(query)
            );
            visibleCount = 5; // Reset count on search
            render();
        }

        document.getElementById('load-more').onclick = () => {
            visibleCount += 5;
            render();
        };

        // Initialize
        fetchWeather();
        fetchRSS();
    </script>
</body>
</html>
