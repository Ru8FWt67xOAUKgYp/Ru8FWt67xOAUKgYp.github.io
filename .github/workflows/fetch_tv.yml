name: Update TV Listings (Stable)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Data
        run: |
          # Using a common JSON mirror for Canadian TV Grid (Montreal)
          # This avoids the Cloudflare wall on the main tvtv site
          URL="https://api.allorigins.win/get?url=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X"))')"
          
          RESPONSE=$(curl -s "$URL")
          
          # Clean and Extract
          RAW_DATA=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.loads(sys.stdin.read())['contents'])")
          
          if [[ $RAW_DATA == \[* ]]; then
            MTL_TIME=$(TZ="America/Montreal" date +"%Y-%m-%d %H:%M")
            echo "{ \"lastUpdated\": \"$MTL_TIME\", \"channels\": $RAW_DATA }" > tele.json
            echo "Success: Data stored."
          else
            echo "Error: Data format invalid."
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TV Grid" && git push)