<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTL TV Guide</title>
    <style>
        :root { --accent: #00a2ff; --live: #ff3b30; --bg: #000; --card: #1c1c1e; --text: #f2f2f7; --border: #38383a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 14px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .ch-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; }
        .prog-title { font-size: 1.2rem; font-weight: 700; margin: 6px 0; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .live-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .next-list { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
        .visible { display: block; }
        .next-item { display: flex; gap: 12px; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .next-time { color: var(--accent); font-weight: 700; min-width: 55px; }
        footer { text-align: center; font-size: 11px; color: #8e8e93; padding: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div id="guide">Chargement...</div>
    <footer>Mise à jour : <span id="sync-time">...</span></footer>
</div>
<script>
    async function init() {
        try {
            const res = await fetch('./tele.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('sync-time').innerText = data.lastUpdated;
            const container = document.getElementById('guide');
            container.innerHTML = "";
            data.channels.forEach((ch, i) => {
                const now = ch.listings[0] || {title: "N/A", startTime: "--:--"};
                const future = ch.listings.slice(1, 8);
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="ch-row"><span>${ch.listName}</span><span>CH ${ch.channel}</span></div>
                    <div class="prog-title" onclick="document.getElementById('nx-${i}').classList.toggle('visible')">
                        <span class="live-dot"></span>${now.title}
                    </div>
                    <div style="font-size:0.9rem">${now.startTime} (${now.duration}m)</div>
                    <div id="nx-${i}" class="next-list">
                        ${future.map(f => `<div class="next-item"><span class="next-time">${f.startTime}</span><span>${f.title}</span></div>`).join('')}
                    </div>`;
                container.appendChild(div);
            });
        } catch (e) { document.getElementById('guide').innerText = "Vérifiez l'Action GitHub..."; }
    }
    init();
</script>
</body>
</html>
