name: Update TV MTL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');
          
          // Using the "all-in-one" Canada source which is less likely to 404
          const EPG_URL = "https://iptv-org.github.io/epg/guides/ca/canada.xml";

          async function start() {
            try {
              console.log("Fetching: " + EPG_URL);
              const res = await fetch(EPG_URL);
              
              if (!res.ok) {
                // Emergency Fallback to the epgshare mirror if the main one is down
                console.log("Primary failed, trying epgshare...");
                const fallback = await fetch("https://raw.githubusercontent.com/acidzebra/epg-config/master/guides/canada.xml");
                if (!fallback.ok) throw new Error("All EPG sources are 404.");
                var xml = await fallback.text();
              } else {
                var xml = await res.text();
              }

              const targets = [
                {reg: /Radio-Canada/i, name: "Radio-Canada"},
                {reg: /Tele-Quebec/i, name: "Télé-Québec"},
                {reg: /TVA/i, name: "TVA"},
                {reg: /Noovo/i, name: "Noovo"},
                {reg: /CBC/i, name: "CBC MTL"},
                {reg: /LCN/i, name: "LCN"},
                {reg: /Series/i, name: "Séries Plus"}
              ];

              const channelsMap = {};
              const chMatch = xml.matchAll(/<channel id="([^"]+)">\s*<display-name[^>]*>([^<]+)<\/display-name>/gi);
              for (const m of chMatch) {
                const id = m[1];
                const displayName = m[2];
                const match = targets.find(t => t.reg.test(displayName) || t.reg.test(id));
                if (match) {
                  channelsMap[id] = { name: match.name, listings: [] };
                }
              }

              const progMatch = xml.matchAll(/<programme start="(\d{8})(\d{4})[^"]+" channel="([^"]+)">\s*<title[^>]*>([^<]+)<\/title>/gi);
              for (const pm of progMatch) {
                const chId = pm[3];
                if (channelsMap[chId]) {
                  channelsMap[chId].listings.push({
                    startTime: pm[2].substring(0,2) + ":" + pm[2].substring(2,4),
                    title: pm[4].replace(/&/g, '&'),
                    sort: pm[1] + pm[2]
                  });
                }
              }

              const final = Object.values(channelsMap)
                .filter(c => c.listings.length > 0)
                .map(c => {
                  c.listings.sort((a,b) => a.sort.localeCompare(b.sort));
                  return { name: c.name, listings: c.listings.slice(0, 10) };
                });

              fs.writeFileSync('tele.json', JSON.stringify({
                lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
                channels: final
              }, null, 2));
              
              console.log("Success! Found " + final.length + " channels.");
            } catch (e) {
              console.error(e.message);
              process.exit(1);
            }
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot"
          git add tele.json
          git commit -m "Fix 404 source" || exit 0
          git push