name: Update TV MTL (Ultimate)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');
          
          // Triple fallback strategy
          const SOURCES = [
            "https://raw.githubusercontent.com/iptv-org/epg/master/guides/ca/tvtv.ca.epg.xml",
            "https://iptv-org.github.io/epg/guides/ca/canada.xml",
            "https://raw.githubusercontent.com/acidzebra/epg-config/master/guides/canada.xml"
          ];

          async function start() {
            let xml = "";
            for (const url of SOURCES) {
              try {
                console.log("Checking: " + url);
                const res = await fetch(url);
                if (res.ok) {
                  xml = await res.text();
                  if (xml.length > 5000) {
                    console.log("Success! Data found at " + url);
                    break;
                  }
                }
              } catch (e) { console.log("Failed source."); }
            }

            if (!xml) {
              console.error("All sources returned 404 or empty data.");
              process.exit(1);
            }

            // Keyword mapping for Montreal favorites
            const FAVS = [
              {reg: /Radio-Canada/i, name: "Radio-Canada"},
              {reg: /Tele-Quebec/i, name: "Télé-Québec"},
              {reg: /TVA/i, name: "TVA"},
              {reg: /Noovo/i, name: "Noovo"},
              {reg: /CBC/i, name: "CBC MTL"},
              {reg: /LCN/i, name: "LCN"},
              {reg: /Series/i, name: "Séries Plus"}
            ];

            const channelsMap = {};
            // Step 1: Map Channel IDs to our clean names
            const chMatch = xml.matchAll(/<channel id="([^"]+)">\s*<display-name[^>]*>([^<]+)<\/display-name>/gi);
            for (const m of chMatch) {
              const id = m[1];
              const displayName = m[2];
              const match = FAVS.find(f => f.reg.test(displayName) || f.reg.test(id));
              if (match) {
                channelsMap[id] = { name: match.name, listings: [] };
              }
            }

            console.log("Matched IDs:", Object.keys(channelsMap));

            // Step 2: Extract Program Listings
            const progMatch = xml.matchAll(/<programme start="(\d{8})(\d{4})[^"]+" channel="([^"]+)">\s*<title[^>]*>([^<]+)<\/title>/gi);
            for (const pm of progMatch) {
              const chId = pm[3];
              if (channelsMap[chId]) {
                const day = pm[1];
                const time = pm[2];
                channelsMap[chId].listings.push({
                  startTime: time.substring(0,2) + ":" + time.substring(2,4),
                  title: pm[4].replace(/&/g, '&'),
                  sort: day + time
                });
              }
            }

            // Step 3: Final Format & Sort
            const final = Object.values(channelsMap)
              .filter(c => c.listings.length > 0)
              .map(c => {
                c.listings.sort((a,b) => a.sort.localeCompare(b.sort));
                return { name: c.name, listings: c.listings.slice(0, 10) };
              });

            const output = {
              lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
              channels: final
            };

            fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
            console.log("Done! Found " + final.length + " active channels.");
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot"
          git add tele.json
          git commit -m "Triple-source sync" || exit 0
          git push