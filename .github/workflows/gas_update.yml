name: Update Gas Prices

on:
  schedule:
    # Runs every 4 hours (UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Adds a manual "Run workflow" button in the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permissions needed to commit the JSON file back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Update Script
        run: python update_gas.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GasBot"
          git config --global user.email "actions@github.com"
          git add gas_prices.json
          # Only commit if there are actually changes to the prices
          git diff-index --quiet HEAD || (git commit -m "Update gas prices for H3W 1X4" && git push)