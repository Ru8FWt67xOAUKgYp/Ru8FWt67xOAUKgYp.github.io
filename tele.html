<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV MTL Dashboard</title>
    <style>
        :root { --accent: #00a2ff; --bg: #ffffff; --card: #f1f3f5; --text: #1a1a1a; --border: #ddd; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0d0d0d; --card: #1a1a1a; --text: #eee; --border: #333; }
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 5px solid var(--accent); position: relative; }
        .ch-header { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .title { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; cursor: pointer; }
        .time { font-size: 0.85rem; color: var(--accent); font-weight: 600; }
        
        /* Schedule/Popup Area */
        .schedule { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 0.9rem; display: none; }
        .schedule.open { display: block; }
        .item { display: flex; gap: 10px; margin-bottom: 6px; }
        .item-time { color: var(--accent); font-weight: bold; min-width: 60px; }
        
        footer { text-align: center; font-size: 0.7rem; color: #666; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="search" class="search-bar" placeholder="Chercher une émission (ex: Nouvelles, Hockey)..." onkeyup="doSearch()">
    <div id="guide">Chargement...</div>
    <footer>Mise à jour: <span id="sync">...</span></footer>
</div>

<script>
    const FAVS = ['CBFT', 'CIVM', 'CFTM', 'CFJP', 'CBMT', 'LCN', 'SERIES'];
    let localStore = [];

    async function load() {
        try {
            const r = await fetch('./tele.json?t=' + Date.now());
            const d = await r.json();
            document.getElementById('sync').innerText = d.lastUpdated;
            
            localStore = d.channels.filter(c => 
                FAVS.some(f => (c.callSign||"").toUpperCase().includes(f))
            ).sort((a,b) => FAVS.findIndex(f => a.callSign.includes(f)) - FAVS.findIndex(f => b.callSign.includes(f)));
            
            render(localStore);
        } catch(e) { document.getElementById('guide').innerText = "Erreur de synchro."; }
    }

    function render(data) {
        const g = document.getElementById('guide');
        g.innerHTML = "";
        data.forEach((ch, i) => {
            const now = ch.listings[0];
            const future = ch.listings.slice(1, 8);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="ch-header"><span>${ch.listName}</span><span>CH ${ch.channel}</span></div>
                <div class="title" onclick="toggle(${i})">${now.title}</div>
                <div class="time">${now.startTime} (${now.duration}m)</div>
                <div id="sched-${i}" class="schedule">
                    ${future.map(f => `<div class="item"><span class="item-time">${f.startTime}</span><span>${f.title}</span></div>`).join('')}
                </div>
            `;
            g.appendChild(div);
        });
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = localStore.filter(c => 
            c.listName.toLowerCase().includes(q) || 
            c.listings.some(l => l.title.toLowerCase().includes(q))
        );
        render(filtered);
    }

    function toggle(id) {
        document.getElementById(`sched-${id}`).classList.toggle('open');
    }

    load();
</script>
</body>
</html>
