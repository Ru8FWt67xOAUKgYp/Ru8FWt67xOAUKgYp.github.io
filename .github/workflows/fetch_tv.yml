 
name: Update TV Listings (Playwright)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to remove the deprecation warning

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch Data
        run: |
          node <<EOF
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
            });

            const page = await context.newPage();

            try {
              console.log("Navigating to API...");
              // Go to the API URL
              await page.goto('https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X', { 
                waitUntil: 'domcontentloaded', 
                timeout: 60000 
              });
              
              // Wait for the body to contain JSON-like characters to bypass the 'Just a moment' screen
              await page.waitForFunction(() => document.body.innerText.trim().startsWith('[') || document.body.innerText.trim().startsWith('{'), { timeout: 30000 });

              const content = await page.innerText('body');
              const channels = JSON.parse(content);
              
              const now = new Date().toLocaleString("en-CA", {timeZone: "America/Montreal", hour12: false});
              const output = { lastUpdated: now, channels: channels };

              fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
              console.log("Success: tele.json updated.");
            } catch (error) {
              console.error("Failed to fetch or parse JSON:", error.message);
              // Log the page content to see what Cloudflare is showing us
              const body = await page.innerText('body').catch(() => 'No body content');
              console.log("Page Content Snippet:", body.substring(0, 200));
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TV listings Playwright" && git push)