name: Update TV MTL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');
          
          // Using a different, usually more populated mirror
          const EPG_URL = "https://iptv-org.github.io/epg/guides/ca/dstv.com.epg.xml";
          const FAVS = ["CBFT", "CIVM", "CFTM", "CFJP", "CBMT", "LCN", "SERIES"];

          async function start() {
            try {
              console.log("Fetching EPG...");
              const res = await fetch(EPG_URL);
              const xml = await res.text();
              
              const channelsMap = {};
              // 1. Find channels by ID or Name
              const chRegex = /<channel id="([^"]+)">\s*<display-name[^>]*>([^<]+)<\/display-name>/g;
              let m;
              while ((m = chRegex.exec(xml)) !== null) {
                const id = m[1];
                const name = m[2];
                if (FAVS.some(f => id.toUpperCase().includes(f) || name.toUpperCase().includes(f))) {
                  channelsMap[id] = { name: name, listings: [] };
                }
              }

              console.log("Matched IDs:", Object.keys(channelsMap));

              // 2. Extract Programs
              const pRegex = /<programme start="(\d{8})(\d{4})[^"]+" channel="([^"]+)">\s*<title[^>]*>([^<]+)<\/title>/g;
              let pm;
              while ((pm = pRegex.exec(xml)) !== null) {
                const startDay = pm[1];
                const startTime = pm[2];
                const chId = pm[3];
                const title = pm[4].replace(/&/g, '&');

                if (channelsMap[chId]) {
                  channelsMap[chId].listings.push({
                    startTime: startTime.substring(0,2) + ":" + startTime.substring(2,4),
                    title: title,
                    sort: startDay + startTime
                  });
                }
              }

              const final = Object.values(channelsMap)
                .filter(c => c.listings.length > 0)
                .map(c => {
                  c.listings.sort((a,b) => a.sort.localeCompare(b.sort));
                  return { name: c.name, listings: c.listings.slice(0,12) };
                });

              fs.writeFileSync('tele.json', JSON.stringify({
                lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
                channels: final
              }, null, 2));
              
              console.log("Finished! Channels found:", final.length);
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot"
          git add tele.json
          git commit -m "Switch source to DSTV mirror" || exit 0
          git push