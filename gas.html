<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montreal Gas</title>
    <style>
        :root { --bg: #fff; --c: #f4f4f4; --t: #111; --a: #d32f2f; --s: #666; }
        @media (prefers-color-scheme: dark) { :root { --bg: #121212; --c: #1e1e1e; --t: #eee; --a: #ff5252; --s: #999; } }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; margin: 0; padding: 10px; }
        .wrap { max-width: 400px; margin: auto; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 15px; }
        h1 { font-size: 1rem; margin: 0; }
        #upd { font-size: 0.7rem; color: var(--s); }
        .row { background: var(--c); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .n { font-weight: bold; font-size: 0.9rem; display: block; }
        .map { font-size: 0.75rem; color: var(--a); text-decoration: none; }
        .p { font-size: 1.4rem; font-weight: 900; color: var(--a); }
    </style>
</head>
<body>
<div class="wrap">
    <header><h1>H3W 1X4 Gas</h1><span id="upd">...</span></header>
    <div id="list">Loading...</div>
</div>
<script>
    async function load() {
        try {
            const r = await fetch(`gas_prices.json?t=${Date.now()}`);
            const d = await r.json();
            document.getElementById('list').innerHTML = d.map(s => `
                <div class="row">
                    <div><span class="n">${s.name}</span>
                    <a class="map" href="https://www.google.com/maps/search/${encodeURIComponent(s.name+' '+s.address)}" target="_blank">📍 ${s.address}</a></div>
                    <div class="p">${s.price}¢</div>
                </div>`).join('');
            document.getElementById('upd').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        } catch(e) { document.getElementById('list').innerHTML = "No data yet."; }
    }
    load();
</script>
</body>
</html>
