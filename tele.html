<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV MTL Pro</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #f2f2f7; --accent: #007aff; --live: #ff3b30; --border: #2c2c2e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; z-index: 10; }
        .search { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--card); color: var(--text); font-size: 16px; box-sizing: border-box; outline: none; }
        .card { background: var(--card); border-radius: 14px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .ch-name { font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .prog-title { font-size: 1.2rem; font-weight: 700; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 8px; margin-right: 40px; }
        .live-dot { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .prog-time { font-size: 0.9rem; opacity: 0.7; margin-top: 4px; }
        .next-list { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
        .next-list.visible { display: block; }
        .next-item { display: flex; gap: 12px; font-size: 0.9rem; padding: 10px 0; border-bottom: 1px solid #222; }
        .next-time { color: var(--accent); font-weight: 700; min-width: 50px; }
        .remote-btn { position: absolute; right: 15px; top: 15px; background: #333; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 18px; }
        footer { text-align: center; font-size: 11px; color: #444; padding: 30px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <input type="text" id="searchInput" class="search" placeholder="Chercher émission..." onkeyup="handleSearch()">
    </div>
    <div id="guide"><div style="text-align:center;padding:50px;color:#666">Chargement...</div></div>
    <footer>
        Dernière synchro: <span id="sync-time">---</span><br>
        <small>Propulsé par Gemini & Votre Persévérance</small>
    </footer>
</div>
<script>
    let fullData = [];
    const STREAMS = {
        "Radio-Canada": "https://ici.tou.tv/en-direct",
        "TVA": "https://www.qub.ca/tvaplus/en-direct",
        "Noovo": "https://www.noovo.ca/en-direct",
        "Télé-Québec": "https://www.telequebec.tv/en-direct",
        "LCN": "https://www.qub.ca/tvaplus/en-direct"
    };

    async function init() {
        try {
            const res = await fetch('./tele.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('sync-time').innerText = data.lastUpdated;
            fullData = data.channels;
            render(fullData);
        } catch (e) {
            document.getElementById('guide').innerHTML = "<div style='text-align:center;padding:50px'>En attente du premier run...</div>";
        }
    }

    function render(list) {
        const container = document.getElementById('guide');
        if (!list.length) { container.innerHTML = "<div style='text-align:center;padding:50px'>JSON vide. Vérifiez GitHub Actions.</div>"; return; }
        container.innerHTML = "";
        list.forEach((ch, i) => {
            const now = ch.listings[0] || {title: "N/A", startTime: "--:--"};
            const future = ch.listings.slice(1, 8);
            const stream = STREAMS[Object.keys(STREAMS).find(k => ch.name.includes(k))] || "https://www.amazon.ca/firetvremote";
            
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <a href="${stream}" target="_blank" class="remote-btn">📺</a>
                <div class="ch-name">${ch.name}</div>
                <div class="prog-title" onclick="document.getElementById('nx-${i}').classList.toggle('visible')">
                    <span class="live-dot"></span>${now.title}
                </div>
                <div class="prog-time">Début: ${now.startTime}</div>
                <div id="nx-${i}" class="next-list">
                    ${future.map(f => `<div class="next-item"><span class="next-time">${f.startTime}</span><span>${f.title}</span></div>`).join('')}
                </div>`;
            container.appendChild(div);
        });
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(fullData.filter(c => c.name.toLowerCase().includes(q) || c.listings.some(l => l.title.toLowerCase().includes(q))));
    }
    init();
</script>
</body>
</html>
