name: Update TV MTL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');
          
          // These are the "Keywords" we are looking for in the XML
          const KEYWORDS = ["Radio-Canada", "Télé-Québec", "TVA", "Noovo", "CBC", "LCN", "Séries Plus"];

          async function start() {
            try {
              console.log("Fetching XML...");
              const res = await fetch("https://iptv-org.github.io/epg/guides/ca/tvtv.ca.epg.xml");
              const xml = await res.text();
              
              const channelsMap = {};

              // 1. First, find ALL channel definitions to get their IDs
              const channelRegex = /<channel id="([^"]+)">\\s*<display-name[^>]*>([^<]+)<\\/display-name>/g;
              let chMatch;
              while ((chMatch = channelRegex.exec(xml)) !== null) {
                const id = chMatch[1];
                const name = chMatch[2];
                if (KEYWORDS.some(k => name.includes(k))) {
                  channelsMap[id] = { name: name, listings: [] };
                }
              }

              const foundIds = Object.keys(channelsMap);
              console.log("Found IDs:", foundIds);

              // 2. Scan the file for programmes belonging to these IDs
              const progRegex = /<programme start="(\\d{8})(\\d{4})[^"]+" channel="([^"]+)">\\s*<title[^>]*>([^<]+)<\\/title>/g;
              let pMatch;
              while ((pMatch = progRegex.exec(xml)) !== null) {
                const channelId = pMatch[3];
                if (channelsMap[channelId]) {
                  const time = pMatch[2];
                  channelsMap[channelId].listings.push({
                    startTime: \`\${time.substring(0,2)}:\${time.substring(2,4)}\`,
                    title: pMatch[4].replace(/&/g, '&'),
                    raw: pMatch[1] + pMatch[2]
                  });
                }
              }

              // 3. Clean up and format
              const finalChannels = Object.values(channelsMap)
                .filter(c => c.listings.length > 0)
                .map(c => {
                  c.listings.sort((a, b) => a.raw.localeCompare(b.raw));
                  return { name: c.name, listings: c.listings.slice(0, 10) };
                });

              const output = {
                lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
                channels: finalChannels
              };

              fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
              console.log(\`Final count: \${finalChannels.length} channels.\`);
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot"
          git add tele.json
          git commit -m "Dynamic keyword sync" || exit 0
          git push