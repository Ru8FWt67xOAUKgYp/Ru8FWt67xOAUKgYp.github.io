<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Télé MTL</title>
    <style>
        :root { --accent: #00a2ff; --bg: #ffffff; --card: #f2f2f7; --text: #1c1c1e; --border: #d1d1d6; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --card: #1c1c1e; --text: #f2f2f7; --border: #38383a; }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        
        .header-tools { position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1rem; box-sizing: border-box; }

        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); transition: background 0.2s; }
        .ch-row { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
        .main-title { font-size: 1.15rem; font-weight: 700; margin: 4px 0; cursor: pointer; color: var(--accent); }
        .time-info { font-size: 0.9rem; margin-bottom: 8px; font-weight: 500; }

        .schedule { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; display: none; }
        .schedule.active { display: block; }
        .sched-item { display: flex; gap: 10px; font-size: 0.85rem; padding: 4px 0; }
        .sched-time { color: var(--accent); font-weight: 600; min-width: 55px; }

        footer { text-align: center; font-size: 0.7rem; color: #8e8e93; margin-top: 20px; padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <h2 style="margin: 10px 0;">Guide TV</h2>
        <input type="text" id="search" class="search-input" placeholder="Chercher un film, sport, poste..." onkeyup="search()">
    </div>

    <div id="guide">Chargement des postes...</div>
    
    <footer>Sync: <span id="update-time">...</span></footer>
</div>

<script>
    const FAVS = ['CBFT', 'CIVM', 'CFTM', 'CFJP', 'CBMT', 'LCN', 'SERIES'];
    let allData = [];

    async function init() {
        try {
            const res = await fetch('./tele.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('update-time').innerText = data.lastUpdated;
            
            // Filter and Sort
            allData = data.channels.filter(c => 
                FAVS.some(f => (c.callSign||"").toUpperCase().includes(f))
            ).sort((a,b) => FAVS.findIndex(f => a.callSign.includes(f)) - FAVS.findIndex(f => b.callSign.includes(f)));

            render(allData);
        } catch (e) {
            document.getElementById('guide').innerHTML = "Erreur. L'Action GitHub doit d'abord réussir.";
        }
    }

    function render(list) {
        const container = document.getElementById('guide');
        container.innerHTML = list.length ? "" : "Aucun résultat.";

        list.forEach((ch, i) => {
            const now = ch.listings[0];
            const later = ch.listings.slice(1, 10);
            
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="ch-row"><span>${ch.listName}</span><span>CH ${ch.channel}</span></div>
                <div class="main-title" onclick="document.getElementById('s-${i}').classList.toggle('active')">${now.title}</div>
                <div class="time-info">${now.startTime} — ${now.duration}m</div>
                <div id="s-${i}" class="schedule">
                    ${later.map(l => `<div class="sched-item"><span class="sched-time">${l.startTime}</span><span>${l.title}</span></div>`).join('')}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function search() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allData.filter(c => 
            c.listName.toLowerCase().includes(q) || 
            c.listings.some(l => l.title.toLowerCase().includes(q))
        );
        render(filtered);
    }

    init();
</script>
</body>
</html>
