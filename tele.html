<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guide TV MTL</title>
    <style>
        :root { --accent: #00a2ff; --bg: #ffffff; --card: #f2f2f7; --text: #1c1c1e; --border: #d1d1d6; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --card: #1c1c1e; --text: #f2f2f7; --border: #38383a; }
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        
        .header { position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0 20px 0; }
        .search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1rem; box-sizing: border-box; }

        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .ch-info { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700; color: #8e8e93; text-transform: uppercase; margin-bottom: 5px; }
        .prog-title { font-size: 1.15rem; font-weight: 700; color: var(--accent); cursor: pointer; margin: 4px 0; }
        .prog-time { font-size: 0.9rem; font-weight: 500; }

        .next-list { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
        .next-list.visible { display: block; }
        .next-item { display: flex; gap: 10px; font-size: 0.85rem; padding: 4px 0; }
        .next-time { color: var(--accent); font-weight: 600; min-width: 55px; }

        footer { text-align: center; font-size: 0.7rem; color: #8e8e93; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin: 0 0 10px 0;">Ma Télé Montréal</h2>
        <input type="text" id="searchInput" class="search" placeholder="Chercher une émission ou un poste..." onkeyup="doSearch()">
    </div>

    <div id="guide">Chargement...</div>
    
    <footer>Dernière sync : <span id="sync-time">...</span></footer>
</div>

<script>
    const MY_FAVS = ['CBFT', 'CIVM', 'CFTM', 'CFJP', 'CBMT', 'LCN', 'SERIES'];
    let fullData = [];

    async function start() {
        try {
            const res = await fetch('./tele.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('sync-time').innerText = data.lastUpdated;
            
            fullData = data.channels.filter(c => 
                MY_FAVS.some(f => (c.callSign||"").toUpperCase().includes(f))
            ).sort((a,b) => MY_FAVS.findIndex(f => a.callSign.includes(f)) - MY_FAVS.findIndex(f => b.callSign.includes(f)));

            display(fullData);
        } catch (e) {
            document.getElementById('guide').innerText = "En attente des données de l'Action GitHub...";
        }
    }

    function display(list) {
        const guide = document.getElementById('guide');
        guide.innerHTML = list.length ? "" : "Aucun poste trouvé.";

        list.forEach((ch, i) => {
            const now = ch.listings[0];
            const future = ch.listings.slice(1, 10);
            
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="ch-info"><span>${ch.listName}</span><span>CH ${ch.channel}</span></div>
                <div class="prog-title" onclick="document.getElementById('nx-${i}').classList.toggle('visible')">${now.title}</div>
                <div class="prog-time">${now.startTime} — ${now.duration} min</div>
                <div id="nx-${i}" class="next-list">
                    ${future.map(f => `<div class="next-item"><span class="next-time">${f.startTime}</span><span>${f.title}</span></div>`).join('')}
                </div>
            `;
            guide.appendChild(div);
        });
    }

    function doSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = fullData.filter(c => 
            c.listName.toLowerCase().includes(q) || 
            c.listings.some(l => l.title.toLowerCase().includes(q))
        );
        display(filtered);
    }

    start();
</script>
</body>
</html>
