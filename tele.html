<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Guide TV Montréal</title>
    <style>
        :root { --accent: #00a2ff; --bg: #0f0f0f; --card: #1a1a1a; --text: #eee; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .card { background: var(--card); border-radius: 10px; padding: 16px; border: 1px solid #2a2a2a; display: flex; flex-direction: column; position: relative; overflow: hidden; margin-bottom: 12px; }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
        
        .ch-name { font-size: 0.75rem; font-weight: 800; color: #888; letter-spacing: 1px; text-transform: uppercase; }
        .show-title { font-size: 1.15rem; font-weight: 600; margin: 4px 0; color: #fff; }
        .time-now { color: #ffca28; font-size: 0.85rem; margin-bottom: 10px; }
        
        .next-container { border-top: 1px solid #333; padding-top: 8px; margin-top: 4px; font-size: 0.9rem; color: #aaa; }
        .next-label { color: var(--accent); font-weight: bold; font-size: 0.7rem; text-transform: uppercase; margin-right: 8px; }

        footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: #555; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">Ma Télé</h2>
    </header>

    <div id="guide">
        <div style="text-align:center; padding:40px; color:#666;">Initialisation...</div>
    </div>

    <footer>
        Dernière mise à jour : <span id="update-time">--:--</span>
    </footer>
</div>

<script>
    const MY_FAVORITES = ['CBFT', 'CIVM', 'CFTM', 'CFJP', 'CBMT', 'LCN', 'SERIES'];

    async function loadData() {
        const guide = document.getElementById('guide');
        const timeSpan = document.getElementById('update-time');

        try {
            // No proxy needed anymore! fetching from your own repo
            const response = await fetch('tele.json');
            const data = await response.json();
            
            timeSpan.innerText = data.lastUpdated;
            guide.innerHTML = "";

            const filtered = data.channels.filter(station => {
                const call = (station.callSign || "").toUpperCase();
                return MY_FAVORITES.some(fav => call.includes(fav));
            }).sort((a, b) => {
                const idxA = MY_FAVORITES.findIndex(f => (a.callSign||"").includes(f));
                const idxB = MY_FAVORITES.findIndex(f => (b.callSign||"").includes(f));
                return idxA - idxB;
            });

            filtered.forEach(station => {
                const now = station.listings[0];
                const next = station.listings[1];
                if (!now) return;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="ch-name">${station.listName} • CH ${station.channel}</div>
                    <div class="show-title">${now.title}</div>
                    <div class="time-now">${now.startTime} — ${now.duration} min</div>
                    ${next ? `
                        <div class="next-container">
                            <span class="next-label">Suivant</span>
                            <span>${next.title} <small style="color:#666">(${next.startTime})</small></span>
                        </div>
                    ` : ''}
                `;
                guide.appendChild(card);
            });

        } catch (err) {
            guide.innerHTML = `<div style="color:red; text-align:center;">Fichier tele.json non détecté.</div>`;
        }
    }

    loadData();
    // Refresh the view every 5 minutes in case the show changed
    setInterval(loadData, 300000);
</script>

</body>
</html>
