name: Update TV Listings (Direct Final)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Data
        run: |
          node <<EOF
          const fs = require('fs');

          const FAVS = [
            {id: 'CBFT', name: 'Radio-Canada'},
            {id: 'CIVM', name: 'Télé-Québec'},
            {id: 'CFTM', name: 'TVA'},
            {id: 'CFJP', name: 'Noovo'},
            {id: 'CBMT', name: 'CBC MTL'},
            {id: 'LCN', name: 'LCN'},
            {id: 'SERIES', name: 'Séries Plus'}
          ];

          async function getEPG() {
            // Using a high-availability Canadian data aggregator
            const url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X");
            
            try {
              const response = await fetch(url);
              const data = await response.json();
              const channels = JSON.parse(data.contents);
              
              const filtered = channels.filter(c => 
                FAVS.some(f => c.callSign.includes(f.id))
              ).map(c => ({
                listName: FAVS.find(f => c.callSign.includes(f.id)).name,
                callSign: c.callSign,
                channel: c.channel,
                listings: c.listings.map(l => ({
                  title: l.title,
                  startTime: l.startTime,
                  duration: l.duration
                }))
              }));

              const now = new Date().toLocaleString("en-CA", {timeZone: "America/Montreal", hour12: false});
              fs.writeFileSync('tele.json', JSON.stringify({lastUpdated: now, channels: filtered}, null, 2));
              console.log("Success! tele.json updated.");
            } catch (e) {
              console.error("Critical Failure:", e.message);
              process.exit(1);
            }
          }
          getEPG();
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Direct source sync" && git push)