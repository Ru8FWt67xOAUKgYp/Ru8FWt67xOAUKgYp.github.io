name: Update TV Listings (Stable Source)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and Process Data
        run: |
          # Fetching from a community mirror for Canadian listings
          # This returns a simpler format that we will adapt for your dashboard
          RESPONSE=$(curl -s "https://api.allorigins.win/get?url=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X"))')")
          
          # Check if the proxy actually got through
          CHECK=$(echo "$RESPONSE" | python3 -c "import sys, json; data=json.loads(sys.stdin.read()); print('OK' if 'contents' in data and data['contents'].startswith('[') else 'FAIL')")

          if [ "$CHECK" == "OK" ]; then
            MTL_TIME=$(TZ="America/Montreal" date +"%Y-%m-%d %H:%M")
            RAW_CONTENTS=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.loads(sys.stdin.read())['contents'])")
            echo "{ \"lastUpdated\": \"$MTL_TIME\", \"channels\": $RAW_CONTENTS }" > tele.json
            echo "Success: tele.json updated."
          else
            echo "Error: Still blocked by Cloudflare. Site is unreachable from GitHub."
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TV Grid" && git push)