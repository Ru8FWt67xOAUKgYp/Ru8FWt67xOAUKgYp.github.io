name: Update TV Listings (Stable)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch via Node
        run: |
          node <<EOF
          const fs = require('fs');

          async function fetchData() {
            const target = "https://www.tvtv.ca/api/grid?lineupId=CAN-0004264-X";
            const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(target);
            
            try {
              const res = await fetch(proxy);
              const data = await res.json();
              
              // AllOrigins returns the stringified JSON in 'contents'
              const rawContents = data.contents;
              
              // Try to parse the inner string to ensure it's valid TV data
              const channels = JSON.parse(rawContents);
              
              if (Array.isArray(channels)) {
                const now = new Date().toLocaleString("en-CA", {timeZone: "America/Montreal", hour12: false});
                const output = { lastUpdated: now, channels: channels };
                fs.writeFileSync('tele.json', JSON.stringify(output, null, 2));
                console.log("Success: tele.json created.");
              } else {
                throw new Error("Data is not an array");
              }
            } catch (err) {
              console.error("Fetch failed: ", err.message);
              process.exit(1);
            }
          }
          fetchData();
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TV Grid" && git push)