name: Update TV MTL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Data
        run: |
          node <<EOF
          const fs = require('fs');
          
          // Using a direct community aggregator that is much more stable than the GitHub mirrors
          const EPG_URL = "https://raw.githubusercontent.com/acidzebra/epg-config/master/guides/canada.xml";

          async function start() {
            try {
              console.log("Fetching stable EPG...");
              const res = await fetch(EPG_URL);
              if (!res.ok) throw new Error("Source down: " + res.status);
              const xml = await res.text();

              const targets = [
                {reg: /Radio-Canada/i, name: "Radio-Canada"},
                {reg: /Tele-Quebec/i, name: "Télé-Québec"},
                {reg: /TVA/i, name: "TVA"},
                {reg: /Noovo/i, name: "Noovo"},
                {reg: /CBC/i, name: "CBC MTL"},
                {reg: /LCN/i, name: "LCN"},
                {reg: /Series/i, name: "Séries Plus"}
              ];

              const channelsMap = {};
              // Match any channel ID that looks like our targets
              const chMatch = xml.matchAll(/<channel id="([^"]+)">\s*<display-name[^>]*>([^<]+)<\/display-name>/gi);
              for (const m of chMatch) {
                const id = m[1];
                const displayName = m[2];
                const match = targets.find(t => t.reg.test(displayName) || t.reg.test(id));
                if (match) {
                  channelsMap[id] = { name: match.name, listings: [] };
                }
              }

              const progMatch = xml.matchAll(/<programme start="(\d{8})(\d{4})[^"]+" channel="([^"]+)">\s*<title[^>]*>([^<]+)<\/title>/gi);
              for (const pm of progMatch) {
                const chId = pm[3];
                if (channelsMap[chId]) {
                  const day = pm[1];
                  const time = pm[2];
                  channelsMap[chId].listings.push({
                    startTime: time.substring(0,2) + ":" + time.substring(2,4),
                    title: pm[4].replace(/&/g, '&'),
                    sort: day + time
                  });
                }
              }

              const final = Object.values(channelsMap)
                .filter(c => c.listings.length > 0)
                .map(c => {
                  c.listings.sort((a,b) => a.sort.localeCompare(b.sort));
                  return { name: c.name, listings: c.listings.slice(0, 10) };
                });

              fs.writeFileSync('tele.json', JSON.stringify({
                lastUpdated: new Date().toLocaleString("fr-CA", {timeZone: "America/Montreal"}),
                channels: final
              }, null, 2));
              
              console.log("Success! Channels found: " + final.length);
            } catch (e) {
              console.error("Action Failed:", e.message);
              process.exit(1);
            }
          }
          start();
          EOF
      - name: Deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tele.json
          git commit -m "Emergency EPG Fix" || exit 0
          git push